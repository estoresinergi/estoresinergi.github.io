<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0f5ec"/>
      <stop offset="50%" stop-color="#f6fbf2"/>
      <stop offset="100%" stop-color="#d8efff"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#006028"/>
      <stop offset="60%" stop-color="#1b7a3a"/>
      <stop offset="100%" stop-color="#005879"/>
    </linearGradient>
    <radialGradient id="blob1" cx="0.2" cy="0.3" r="0.4">
      <stop offset="0%" stop-color="#1b7a3a" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#1b7a3a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob2" cx="0.85" cy="0.75" r="0.4">
      <stop offset="0%" stop-color="#005879" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#005879" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#blob1)"/>
  <rect width="1200" height="630" fill="url(#blob2)"/>

  <!-- Brand mark -->
  <g transform="translate(80, 96)">
    <rect width="64" height="64" rx="14" fill="#006028"/>
    <path d="M50 18c-2 1-5 3-8 6-7 7-9 15-7 22-1-1-3-3-4-5-4-7-3-15 2-21 5-5 12-7 17-2z" fill="#ffffff" transform="translate(0,0)"/>
    <text x="84" y="42" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="800" fill="#006028">Sinergi E-Store</text>
  </g>

  <!-- Tagline pill -->
  <g transform="translate(80, 220)">
    <rect width="380" height="44" rx="22" fill="white" fill-opacity="0.7" stroke="#becabc" stroke-width="1"/>
    <circle cx="24" cy="22" r="5" fill="#006028"/>
    <text x="40" y="29" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#3f493f" letter-spacing="0.5">MARKETPLACE UMKM INDONESIA</text>
  </g>

  <!-- Main headline -->
  <g transform="translate(80, 308)">
    <text font-family="'Plus Jakarta Sans', Inter, system-ui, sans-serif" font-size="96" font-weight="900" fill="#181d18" letter-spacing="-3">
      <tspan x="0" y="0">Tumbuh</tspan>
      <tspan x="0" y="100" font-style="italic" font-weight="300" fill="#3f493f">bersama</tspan>
      <tspan x="0" y="200" fill="url(#brand)">UMKM Indonesia.</tspan>
    </text>
  </g>

  <!-- Footer stats -->
  <g transform="translate(80, 558)">
    <text font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#181d18">
      <tspan>3 tier merchant</tspan>
      <tspan x="220">·</tspan>
      <tspan x="245">0.7% cashback QRIS</tspan>
      <tspan x="475">·</tspan>
      <tspan x="500">live commerce</tspan>
    </text>
  </g>

  <!-- Decorative phone-frame illustration on right -->
  <g transform="translate(870, 100)" opacity="0.95">
    <rect x="0" y="0" width="240" height="430" rx="40" fill="#181d18"/>
    <rect x="10" y="10" width="220" height="410" rx="32" fill="#f6fbf2"/>
    <rect x="22" y="32" width="196" height="100" rx="14" fill="#1b7a3a"/>
    <text x="34" y="60" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="white" opacity="0.9">Halo Dina</text>
    <text x="34" y="90" font-family="'Plus Jakarta Sans', sans-serif" font-size="18" font-weight="800" fill="white">Dukung UMKM</text>
    <text x="34" y="112" font-family="'Plus Jakarta Sans', sans-serif" font-size="18" font-weight="800" fill="white">Indonesia</text>

    <rect x="22" y="148" width="196" height="80" rx="12" fill="white" stroke="#dfe4db"/>
    <circle cx="42" cy="188" r="12" fill="#ba1a1a"/>
    <text x="62" y="178" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#181d18">LIVE</text>
    <text x="62" y="195" font-family="Inter, sans-serif" font-size="9" fill="#3f493f">Batik Yogya Budi</text>
    <text x="62" y="210" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#006028">Rp 385.000</text>

    <g transform="translate(22, 244)">
      <rect width="92" height="74" rx="10" fill="white" stroke="#dfe4db"/>
      <rect x="10" y="10" width="72" height="36" rx="6" fill="#80da8e" opacity="0.4"/>
      <text x="10" y="60" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#181d18">Fashion</text>
    </g>
    <g transform="translate(126, 244)">
      <rect width="92" height="74" rx="10" fill="white" stroke="#dfe4db"/>
      <rect x="10" y="10" width="72" height="36" rx="6" fill="#7dd0ff" opacity="0.4"/>
      <text x="10" y="60" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#181d18">Kuliner</text>
    </g>

    <rect x="22" y="334" width="196" height="48" rx="10" fill="#006028"/>
    <text x="120" y="362" font-family="Inter, sans-serif" font-size="13" font-weight="800" fill="white" text-anchor="middle">Mulai Belanja</text>
  </g>
</svg>
